<svg xmlns="http://www.w3.org/2000/svg" width="650" height="250">
  <style>
    /* Terminal Font Styling */
    .terminal { 
        font-family: 'Courier New', Courier, monospace; 
        font-size: 15px; 
        fill: #00FF99; 
        white-space: pre; 
    }
    .prompt { font-weight: bold; fill: #00d9ff; }
    .log { fill: #c9d1d9; }
    
    /* Animation Keyframes for Frame-by-Frame Execution */
    @keyframes f1 { 0%, 24.9% { opacity: 1; } 25%, 100% { opacity: 0; } }
    @keyframes f2 { 0%, 24.9% { opacity: 0; } 25%, 49.9% { opacity: 1; } 50%, 100% { opacity: 0; } }
    @keyframes f3 { 0%, 49.9% { opacity: 0; } 50%, 74.9% { opacity: 1; } 75%, 100% { opacity: 0; } }
    @keyframes f4 { 0%, 74.9% { opacity: 0; } 75%, 99.9% { opacity: 1; } 100% { opacity: 0; } }
    
    /* Applying Keyframes to Frame Groups */
    .frame1 { animation: f1 4s infinite; opacity: 0; }
    .frame2 { animation: f2 4s infinite; opacity: 0; }
    .frame3 { animation: f3 4s infinite; opacity: 0; }
    .frame4 { animation: f4 4s infinite; opacity: 0; }
  </style>
  
  <!-- Terminal Background UI -->
  <rect width="100%" height="100%" fill="#0D1117" rx="8" />
  <circle cx="20" cy="20" r="6" fill="#ff5f56" />
  <circle cx="40" cy="20" r="6" fill="#ffbd2e" />
  <circle cx="60" cy="20" r="6" fill="#27c93f" />

  <!-- ================= FRAME 1: SLEEPING ================= -->
  <g class="frame1 terminal" xml:space="preserve">
    <text x="20" y="60"><tspan class="prompt">root@mudasir-ai:~#</tspan> ./boot_agent.sh</text>
    <text x="20" y="80"><tspan class="log">[ ○ ] Powering up Neural Matrices...</tspan></text>
    <text x="20" y="120">      ________</text>
    <text x="20" y="140">     | -    - |</text>
    <text x="20" y="160">     |  ____  |</text>
    <text x="20" y="180">     |________|</text>
    <text x="20" y="200">       ||  ||  </text>
  </g>

  <!-- ================= FRAME 2: BOOTING ================= -->
  <g class="frame2 terminal" xml:space="preserve">
    <text x="20" y="60"><tspan class="prompt">root@mudasir-ai:~#</tspan> ./boot_agent.sh</text>
    <text x="20" y="80"><tspan class="log">[ ◐ ] Initializing Vision Optics...</tspan></text>
    <text x="20" y="120">      ________</text>
    <text x="20" y="140">     | o    o |</text>
    <text x="20" y="160">     |  ----  |</text>
    <text x="20" y="180">     |________|</text>
    <text x="20" y="200">       ||  ||  </text>
  </g>

  <!-- ================= FRAME 3: WAVING ================= -->
  <g class="frame3 terminal" xml:space="preserve">
    <text x="20" y="60"><tspan class="prompt">root@mudasir-ai:~#</tspan> ./boot_agent.sh</text>
    <text x="20" y="80"><tspan class="log">[ ◕ ] Agentic System Online. Hello!</tspan></text>
    <text x="20" y="120">      ________       __</text>
    <text x="20" y="140">     | ^    ^ |     / /</text>
    <text x="20" y="160">     |  ====  | ---/ /</text>
    <text x="20" y="180">     |________|</text>
    <text x="20" y="200">       ||  ||  </text>
  </g>

  <!-- ================= FRAME 4: READY ================= -->
  <g class="frame4 terminal" xml:space="preserve">
    <text x="20" y="60"><tspan class="prompt">root@mudasir-ai:~#</tspan> ./boot_agent.sh</text>
    <text x="20" y="80"><tspan class="log">[ ● ] Autonomous Mode Active. Awaiting Tasks.</tspan></text>
    <text x="20" y="120">      ________</text>
    <text x="20" y="140">     | >    < |</text>
    <text x="20" y="160">     |  ____  |</text>
    <text x="20" y="180">     |________|</text>
    <text x="20" y="200">       ||  ||  </text>
  </g>
</svg>
